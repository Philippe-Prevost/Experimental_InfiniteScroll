<!DOCTYPE html>
<html>

<head>

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {

            margin: 0;
            padding: 0;

            overflow: hidden;

            background: black;

            touch-action: none;

            font-family: sans-serif;
        }

        video {

            position: absolute;

            width: 100vw;
            height: 100vh;

            object-fit: cover;

            top: 0;
            left: 0;

            background: black;

            will-change: transform;
        }

        #label {

            position: fixed;

            top: 10px;
            left: 10px;

            color: white;

            background: rgba(0,0,0,0.5);

            padding: 6px 10px;

            border-radius: 8px;

            z-index: 100;
        }

        #debug {

            position: fixed;

            bottom: 10px;
            left: 10px;

            color: white;

            background: rgba(0,0,0,0.6);

            padding: 10px;

            border-radius: 8px;

            z-index: 100;

            font-family: monospace;
            font-size: 12px;

            line-height: 1.5;
        }

        #controls {

            position: fixed;

            top: 60px;
            left: 10px;

            width: 220px;

            color: white;

            background: rgba(0,0,0,0.7);

            padding: 12px;

            border-radius: 10px;

            z-index: 200;
        }

        #controls label {

            display: block;

            margin-top: 10px;

            font-size: 12px;
        }

        #controls input {

            width: 100%;
        }

        #startButton {

            position: fixed;

            top: 320px;
            left: 10px;

            z-index: 300;

            padding: 12px 16px;

            border: none;

            border-radius: 10px;

            background: white;

            color: black;

            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- LABEL -->

    <div id="label">
        Motion Adaptive Feed
    </div>

    <!-- DEBUG -->

    <div id="debug">
        Loading...
    </div>

    <!-- CONTROLS -->

    <div id="controls">

        <label>
            Base Delay

            <input
                type="range"
                id="delaySlider"
                min="0"
                max="2000"
                value="300">
        </label>

        <label>
            Swipe Threshold

            <input
                type="range"
                id="thresholdSlider"
                min="50"
                max="400"
                value="120">
        </label>

        <label>
            Walking Delay

            <input
                type="range"
                id="walkingSlider"
                min="0"
                max="2000"
                value="400">
        </label>

        <label>
            Transition Delay

            <input
                type="range"
                id="transitionSlider"
                min="0"
                max="3000"
                value="900">
        </label>

    </div>

    <!-- START BUTTON -->

    <button id="startButton">
        Start Feed
    </button>

    <!-- VIDEOS -->

    <video
        id="current"
        muted
        playsinline></video>

    <video
        id="next"
        muted
        playsinline></video>

    <script>

        // ---------------------------------
        // VIDEOS
        // ---------------------------------

        const videos = [

            "videos/vid1.mp4",
            "videos/vid2.mp4",
            "videos/vid3.mp4",
            "videos/vid4.mp4"

        ];

        // ---------------------------------
        // ELEMENTS
        // ---------------------------------

        let current =
            document.getElementById("current");

        let next =
            document.getElementById("next");

        const debug =
            document.getElementById("debug");

        const startButton =
            document.getElementById("startButton");

        // ---------------------------------
        // SESSION
        // ---------------------------------

        let currentIndex = 0;

        let swipeCount = 0;

        let lastSwipe = Date.now();

        const sessionStart = Date.now();

        // ---------------------------------
        // LIVE PARAMETERS
        // ---------------------------------

        let baseDelay = 300;

        let swipeThreshold = 120;

        let walkingDelay = 400;

        let transitionDelay = 900;

        // ---------------------------------
        // MOTION
        // ---------------------------------

        let motionLevel = 0;

        let movementState = "still";

        // ---------------------------------
        // SLIDERS
        // ---------------------------------

        document
        .getElementById("delaySlider")
        .oninput = e => {

            baseDelay =
                parseInt(e.target.value);

        };

        document
        .getElementById("thresholdSlider")
        .oninput = e => {

            swipeThreshold =
                parseInt(e.target.value);

        };

        document
        .getElementById("walkingSlider")
        .oninput = e => {

            walkingDelay =
                parseInt(e.target.value);

        };

        document
        .getElementById("transitionSlider")
        .oninput = e => {

            transitionDelay =
                parseInt(e.target.value);

        };

        // ---------------------------------
        // MOTION SENSING
        // ---------------------------------

        function startMotion() {

            window.addEventListener(
                "devicemotion",
                e => {

                    const acc =
                        e.accelerationIncludingGravity;

                    if (!acc) return;

                    motionLevel =

                        Math.abs(acc.x || 0) +
                        Math.abs(acc.y || 0) +
                        Math.abs(acc.z || 0);

                    if (motionLevel < 18) {

                        movementState = "still";

                    }

                    else if (motionLevel < 35) {

                        movementState = "walking";

                    }

                    else {

                        movementState = "transition";

                    }

                }
            );

        }

        // ---------------------------------
        // IOS START BUTTON
        // ---------------------------------

        startButton.addEventListener(
            "click",
            async () => {

                // iOS motion permission

                if (

                    typeof DeviceMotionEvent !== "undefined" &&

                    typeof DeviceMotionEvent.requestPermission === "function"

                ) {

                    try {

                        const permission =

                            await DeviceMotionEvent.requestPermission();

                        if (permission === "granted") {

                            startMotion();

                        }

                    }

                    catch(err) {

                        console.log(err);

                    }

                }

                else {

                    startMotion();

                }

                // start videos AFTER interaction

                current.src = videos[0];

                current.load();

                current.play().catch(err => {
                    console.log(err);
                });

                preload(1);

                startButton.style.display = "none";

            }
        );

        // ---------------------------------
        // PRELOAD
        // ---------------------------------

        function preload(index) {

            const file =
                videos[index % videos.length];

            next.preload = "auto";

            next.src = file;

            next.load();

        }

        // ---------------------------------
        // DEBUG
        // ---------------------------------

        function updateDebug(interval = 0) {

            const sessionTime =

                Math.floor(
                    (Date.now() - sessionStart) / 1000
                );

            debug.innerHTML = `

                Motion: ${motionLevel.toFixed(1)}<br>

                State: ${movementState}<br>

                Swipes: ${swipeCount}<br>

                Interval: ${interval}ms<br>

                Base Delay: ${baseDelay}<br>

                Threshold: ${swipeThreshold}<br>

                Session: ${sessionTime}s

            `;
        }

        setInterval(updateDebug, 100);

        // ---------------------------------
        // DRAGGING
        // ---------------------------------

        let dragging = false;

        let startY = 0;

        let currentY = 0;

        // ---------------------------------
        // TOUCH START
        // ---------------------------------

        document.addEventListener(
            "touchstart",
            e => {

                dragging = true;

                startY =
                    e.touches[0].clientY;

                currentY = startY;

                current.style.transition =
                    "none";

                next.style.transition =
                    "none";

            }
        );

        // ---------------------------------
        // TOUCH MOVE
        // ---------------------------------

        document.addEventListener(
            "touchmove",
            e => {

                if (!dragging) return;

                currentY =
                    e.touches[0].clientY;

                let deltaY =
                    currentY - startY;

                if (deltaY < 0) {

                    current.style.transform =

                        `translateY(${deltaY}px)`;

                    next.style.transform =

                        `translateY(${window.innerHeight + deltaY}px)`;

                }

            }
        );

        // ---------------------------------
        // TOUCH END
        // ---------------------------------

        document.addEventListener(
            "touchend",
            e => {

                dragging = false;

                let dy =

                    e.changedTouches[0].clientY
                    - startY;

                current.style.transition =

                    "transform 0.35s ease";

                next.style.transition =

                    "transform 0.35s ease";

                // COMPLETE SWIPE

                if (dy < -swipeThreshold) {

                    const now = Date.now();

                    const interval =
                        now - lastSwipe;

                    lastSwipe = now;

                    swipeCount++;

                    let extraDelay =
                        baseDelay;

                    if (
                        movementState === "walking"
                    ) {

                        extraDelay +=
                            walkingDelay;

                    }

                    if (
                        movementState === "transition"
                    ) {

                        extraDelay +=
                            transitionDelay;

                    }

                    if (interval < 1200) {

                        extraDelay += 500;

                    }

                    // ANIMATE

                    current.style.transform =
                        "translateY(-100vh)";

                    next.style.transform =
                        "translateY(0vh)";

                    // SWAP

                    setTimeout(() => {

                        let temp = current;

                        current = next;

                        next = temp;

                        current.style.transition =
                            "none";

                        next.style.transition =
                            "none";

                        current.style.transform =
                            "translateY(0vh)";

                        next.style.transform =
                            "translateY(100vh)";

                        currentIndex =

                            (currentIndex + 1)
                            % videos.length;

                        preload(currentIndex + 1);

                        current.play().catch(err => {
                            console.log(err);
                        });

                    }, 350 + extraDelay);

                }

                // SNAP BACK

                else {

                    current.style.transform =
                        "translateY(0vh)";

                    next.style.transform =
                        "translateY(100vh)";

                }

            }
        );

        // ---------------------------------
        // VIDEO DEBUG
        // ---------------------------------

        current.addEventListener(
            "loadeddata",
            () => {

                console.log("Current video loaded");

            }
        );

        current.addEventListener(
            "error",
            e => {

                console.log("Current video failed", e);

            }
        );

        next.addEventListener(
            "error",
            e => {

                console.log("Next video failed", e);

            }
        );

    </script>

</body>

</html>
